steps:
  # Backend: Build Docker Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Backend Docker Image'
    args: [
      'build', '-t', 'gcr.io/gen-lang-client-0851999694/chatterfix-backend', './chatterfix'
    ]

  # Backend: Push Docker Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Backend Docker Image'
    args: [
      'push', 'gcr.io/gen-lang-client-0851999694/chatterfix-backend'
    ]

  # Frontend: Install Dependencies
  - name: 'node:20'
    id: 'Install Frontend Dependencies'
    dir: 'frontend'
    entrypoint: 'npm'
    args: ['install']

  # Frontend: Build Frontend
  - name: 'node:20'
    id: 'Build Frontend'
    dir: 'frontend'
    entrypoint: 'npm'
    args: ['run', 'build']

images:
  - 'gcr.io/gen-lang-client-0851999694/chatterfix-backend'

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 1200s
